<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>NetSim — Explanation</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .exp-wrap {
            width: 100%;
            max-width: 900px;
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .exp-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .exp-heading {
            font-size: .72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--primary);
            padding-bottom: .5rem;
            border-bottom: 1px solid rgba(59, 130, 246, .25);
        }

        /* CRC table */
        .crc-div-wrap {
            overflow-x: auto;
        }

        .crc-div-table {
            border-collapse: collapse;
            font-family: var(--mono);
            font-size: .85rem;
            width: 100%;
        }

        .crc-div-table th {
            background: rgba(59, 130, 246, .12);
            color: var(--primary);
            padding: .5rem .8rem;
            border: 1px solid rgba(59, 130, 246, .2);
            font-weight: 700;
        }

        .crc-div-table td {
            padding: .45rem .8rem;
            border: 1px solid var(--glass-b);
        }

        .crc-div-table .sep-row td {
            border-top: 2px solid rgba(255, 255, 255, .2);
        }

        .crc-div-table .result-row td {
            background: rgba(16, 185, 129, .08);
            color: var(--green);
        }

        /* Hamming interactive */
        .ham-pos-diagram {
            display: flex;
            gap: .6rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .parity-group-box {
            background: rgba(139, 92, 246, .1);
            border: 1px solid rgba(139, 92, 246, .25);
            border-radius: 10px;
            padding: .75rem;
            cursor: pointer;
            transition: all .2s;
        }

        .parity-group-box:hover {
            background: rgba(139, 92, 246, .2);
            transform: translateY(-2px);
        }

        .parity-group-box h5 {
            font-size: .75rem;
            font-weight: 700;
            color: var(--violet);
            margin-bottom: .4rem;
        }

        .parity-group-box .covered-positions {
            display: flex;
            gap: .25rem;
            flex-wrap: wrap;
        }

        .mini-bit {
            width: 28px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            font-family: var(--mono);
            font-size: .8rem;
            font-weight: 700;
        }

        .mini-bit.data {
            background: #1e3a8a;
            color: #93c5fd;
            border: 1px solid #3b82f6;
        }

        .mini-bit.parity {
            background: #3b0764;
            color: #c4b5fd;
            border: 1px solid #8b5cf6;
        }

        .mini-bit.active {
            outline: 2px solid var(--amber);
            outline-offset: 2px;
        }

        /* Syndrome table */
        .syn-wrap {
            overflow-x: auto;
        }

        .step-by-step {
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }

        .explain-step {
            background: rgba(0, 0, 0, .2);
            border-radius: 8px;
            padding: .75rem 1rem;
            border-left: 3px solid var(--glass-b);
            animation: slideRow .3s ease both;
        }

        .explain-step.crc-step {
            border-color: var(--primary);
        }

        .explain-step.ham-step {
            border-color: var(--violet);
        }

        .explain-step.pass-step {
            border-color: var(--green);
        }

        .explain-step.fail-step {
            border-color: var(--red);
        }
    </style>
</head>

<body>
    <nav class="nav-strip">
        <div class="nav-logo">Net<span>Sim</span></div>
        <div class="nav-steps"></div>
    </nav>

    <div class="page-root page-wrap">
        <h1 class="section-title">📘 Algorithm Explanation</h1>
        <p class="section-sub">A visual step-by-step breakdown of how the algorithm works on your data.</p>

        <div class="exp-wrap" id="exp-wrap">
            <div class="card" style="text-align:center;padding:3rem;">
                <div style="font-size:2rem;margin-bottom:1rem;">⏳</div>
                <div style="color:var(--muted);">Loading explanation…</div>
            </div>
        </div>

        <div style="display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;">
            <button class="btn btn-ghost" onclick="navigate('channel.html')">← Back to Channel</button>
            <button class="btn btn-primary" onclick="navigate('receiver.html')">Go to Receiver →</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        buildNav('explanation.html');
        // Guard: only if came from channel
        if (!State.codeword) {
            document.getElementById('exp-wrap').innerHTML = `<div class="card" style="text-align:center;padding:3rem;color:var(--red)">
    ⚠️ Please complete the Transmit step first!<br><br>
    <button class="btn btn-primary" onclick="navigate('index.html')">Go to Home</button>
  </div>`;
        } else {
            buildExplanation();
        }

        function buildExplanation() {
            const wrap = document.getElementById('exp-wrap');
            wrap.innerHTML = '';
            const mode = State.mode;
            const data = State.data;
            const codeword = State.codeword;
            const parity = State.parity;

            if (mode === 'crc') buildCRCExplanation(wrap, data, State.poly, codeword);
            else buildHammingExplanation(wrap, data, codeword, parity);
        }

        function buildCRCExplanation(wrap, data, poly, codeword) {
            const rem = codeword.slice(data.length);
            const appended = data + '0'.repeat(poly.length - 1);

            // Overview card
            const ov = document.createElement('div'); ov.className = 'card exp-section';
            ov.innerHTML = `
    <div class="exp-heading">🔁 CRC Overview</div>
    <div class="step-by-step">
      <div class="explain-step crc-step" style="animation-delay:.0s"><strong>Step 1 — Original Data:</strong> <span style="font-family:var(--mono);color:#93c5fd;letter-spacing:2px">${data}</span></div>
      <div class="explain-step crc-step" style="animation-delay:.1s"><strong>Step 2 — Polynomial G(x):</strong> <span style="font-family:var(--mono);color:#c4b5fd;letter-spacing:2px">${poly}</span> (degree ${poly.length - 1})</div>
      <div class="explain-step crc-step" style="animation-delay:.2s"><strong>Step 3 — Append ${poly.length - 1} zeros:</strong> <span style="font-family:var(--mono);color:#60a5fa;letter-spacing:2px">${appended}</span></div>
      <div class="explain-step crc-step" style="animation-delay:.3s"><strong>Step 4 — XOR Divide by G(x)</strong> (long division in modulo-2 arithmetic, no carries/borrows).</div>
      <div class="explain-step pass-step" style="animation-delay:.4s"><strong>Step 5 — Remainder (CRC):</strong> <span style="font-family:var(--mono);color:#6ee7b7;letter-spacing:2px">${rem}</span> → Frame sent = <span style="font-family:var(--mono);">${codeword}</span></div>
    </div>`;
            wrap.appendChild(ov);

            // Full division table
            const { steps } = mod2div(appended, poly);
            const divCard = document.createElement('div'); divCard.className = 'card exp-section';
            divCard.innerHTML = `<div class="exp-heading">⊕ Full XOR Long Division Table</div>`;
            const divWrap = document.createElement('div'); divWrap.className = 'crc-div-wrap';
            const tbl = document.createElement('table'); tbl.className = 'crc-div-table';
            tbl.innerHTML = `<thead><tr><th>#</th><th>Current Dividend</th><th>÷ Divisor</th><th>XOR Result</th><th>Next Window</th></tr></thead>`;
            const tbody = document.createElement('tbody');
            steps.forEach((s, i) => {
                const tr = document.createElement('tr');
                if (i === steps.length - 1) tr.className = 'result-row';
                tr.style.animationDelay = (i * 0.05) + 's';
                tr.style.animation = 'slideRow .3s ease both';
                tr.innerHTML = `
      <td style="color:var(--muted)">${i + 1}</td>
      <td style="color:#93c5fd;letter-spacing:2px">${s.dividend}</td>
      <td style="color:#c4b5fd;letter-spacing:2px">${s.divisor}</td>
      <td style="color:#6ee7b7;letter-spacing:2px">${s.xored}</td>
      <td style="color:var(--muted);letter-spacing:2px">${s.bring}</td>`;
                tbody.appendChild(tr);
            });
            tbl.appendChild(tbody);
            divWrap.appendChild(tbl);
            divCard.appendChild(divWrap);
            wrap.appendChild(divCard);

            // Why it works
            const why = document.createElement('div'); why.className = 'card exp-section';
            why.innerHTML = `
    <div class="exp-heading">💡 Why It Works</div>
    <p style="color:#cbd5e1;line-height:1.8;font-size:.9rem">In Modulo-2 arithmetic, XOR replaces subtraction. By appending placeholder zeros, we're computing Data × 2<sup>r</sup> — creating space for the remainder. The resulting remainder is guaranteed to cancel out when re-divided at the receiver, <em>if and only if</em> no bits were altered during transmission.</p>`;
            wrap.appendChild(why);
        }

        function buildHammingExplanation(wrap, data, codeword, parity) {
            const { r, positions, bits, parityCalcs } = hammingEncode(data, parity);
            const n = codeword.length;

            // Overview
            const ov = document.createElement('div'); ov.className = 'card exp-section';
            ov.innerHTML = `
    <div class="exp-heading">🛡️ Hamming Code Overview</div>
    <div class="step-by-step">
      <div class="explain-step ham-step" style="animation-delay:.0s"><strong>Data (m = ${data.length} bits):</strong> <span style="font-family:var(--mono);color:#93c5fd;letter-spacing:2px">${data}</span></div>
      <div class="explain-step ham-step" style="animation-delay:.1s"><strong>Parity bits needed (r = ${r}):</strong> 2ʳ = ${1 << r} ≥ ${data.length} + ${r} + 1 = ${data.length + r + 1} ✔</div>
      <div class="explain-step ham-step" style="animation-delay:.2s"><strong>Total codeword length:</strong> n = m + r = ${data.length} + ${r} = ${n} bits</div>
      <div class="explain-step ham-step" style="animation-delay:.3s"><strong>Parity positions (powers of 2):</strong> ${parityCalcs.map(p => 'P' + p.pos).join(', ')}</div>
      <div class="explain-step ham-step" style="animation-delay:.4s"><strong>Parity type:</strong> ${parity.toUpperCase()} — each parity bit makes the XOR of its group = ${parity === 'even' ? '0' : '1'}</div>
      <div class="explain-step pass-step" style="animation-delay:.5s"><strong>Final Codeword:</strong> <span style="font-family:var(--mono);color:#6ee7b7;letter-spacing:2px">${codeword}</span></div>
    </div>`;
            wrap.appendChild(ov);

            // Parity group interactive
            const pgCard = document.createElement('div'); pgCard.className = 'card exp-section';
            pgCard.innerHTML = `<div class="exp-heading">🎯 Parity Groups (Hover to Highlight)</div><p style="color:var(--muted);font-size:.82rem;margin-bottom:1rem">Each parity bit P covers specific positions. Hover a card to see which bits it checks.</p>`;
            const fullRow = document.createElement('div');
            fullRow.style.cssText = 'display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:1.2rem;';
            codeword.split('').forEach((b, i) => {
                const pos = n - i;
                const isParity = (pos & (pos - 1)) === 0;
                const mini = document.createElement('div');
                mini.className = `mini-bit ${isParity ? 'parity' : 'data'}`;
                mini.id = `ebit-${pos}`;
                mini.textContent = b;
                mini.title = isParity ? `Parity bit P${pos}` : `Data bit at position ${pos}`;
                fullRow.appendChild(mini);
            });
            pgCard.appendChild(fullRow);

            const pgRow = document.createElement('div'); pgRow.className = 'ham-pos-diagram';
            parityCalcs.forEach(calc => {
                const box = document.createElement('div'); box.className = 'parity-group-box';
                box.innerHTML = `<h5>P${calc.pos} (pos ${calc.pos}) = ${calc.val}</h5>
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:.4rem;">Covers: ${calc.covers.join(', ')}</div>
      <div class="covered-positions">${calc.covers.map(c => `<div class="mini-bit ${(c & (c - 1)) === 0 ? 'parity' : 'data'}" style="font-size:.72rem">${codeword[n - c]}</div>`).join('')}</div>`;
                box.addEventListener('mouseenter', () => {
                    calc.covers.forEach(c => {
                        const el = document.getElementById(`ebit-${c}`);
                        if (el) el.classList.add('active');
                    });
                    const self = document.getElementById(`ebit-${calc.pos}`);
                    if (self) self.classList.add('active');
                });
                box.addEventListener('mouseleave', () => {
                    document.querySelectorAll('.mini-bit.active').forEach(el => el.classList.remove('active'));
                });
                pgRow.appendChild(box);
            });
            pgCard.appendChild(pgRow);
            wrap.appendChild(pgCard);

            // Parity table
            const ptCard = document.createElement('div'); ptCard.className = 'card exp-section';
            ptCard.innerHTML = `<div class="exp-heading">📊 Parity Bit Calculation Table</div>`;
            const synWrap = document.createElement('div'); synWrap.className = 'syn-wrap';
            const tbl = document.createElement('table'); tbl.className = 'syndrome-table';
            tbl.innerHTML = `<thead><tr><th>Parity Bit</th><th>Covers Positions</th><th>Bits at Those Positions</th><th>XOR Result</th><th>Value Set</th></tr></thead>`;
            const tbody = document.createElement('tbody');
            parityCalcs.forEach((calc, i) => {
                const tr = document.createElement('tr');
                tr.style.animationDelay = (i * 0.06) + 's';
                tr.style.animation = 'slideRow .3s ease both';
                const bits = calc.covers.map(c => codeword[n - c]).join(' ⊕ ');
                tr.innerHTML = `
      <td style="color:var(--violet);font-weight:700">P${calc.pos}</td>
      <td>[${calc.covers.join(', ')}]</td>
      <td style="font-family:var(--mono)">${bits}</td>
      <td style="font-family:var(--mono);color:var(--primary)">${calc.val}</td>
      <td style="font-family:var(--mono);font-weight:700;color:${parity === 'even' ? 'var(--green)' : 'var(--amber)'}">${calc.val}</td>`;
                tbody.appendChild(tr);
            });
            tbl.appendChild(tbody);
            synWrap.appendChild(tbl);
            ptCard.appendChild(synWrap);
            wrap.appendChild(ptCard);
        }
    </script>
</body>

</html>
